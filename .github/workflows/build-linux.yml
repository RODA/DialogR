name: build Linux intel

on:
  workflow_dispatch:
    inputs:
      dialogforge_ref:
        description: DialogForge branch, tag, or commit SHA.
        required: false
        default: ""
        type: string
      publish_release:
        description: Upload build outputs to a GitHub release.
        required: false
        default: true
        type: boolean
      release_tag:
        description: Release tag to upload artifacts to (used when publishing).
        required: false
        default: li
        type: string
      release_repository:
        description: Target release repository in owner/repo form (used when publishing).
        required: false
        default: RODA/DialogR
        type: string
      overwrite_release_assets:
        description: Replace existing release assets with matching filenames (used when publishing).
        required: false
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - name: Check out product
        uses: actions/checkout@v5
        with:
          path: product

      - name: Check out DialogForge
        uses: actions/checkout@v5
        with:
          repository: ${{ vars.DIALOGFORGE_REPOSITORY || 'dusadrian/DialogForge' }}
          ref: ${{ inputs.dialogforge_ref != '' && inputs.dialogforge_ref || vars.DIALOGFORGE_REF || 'main' }}
          path: DialogForge

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: DialogForge/package-lock.json

      - name: Install DialogForge dependencies
        working-directory: DialogForge
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            if npm ci; then
              exit 0
            fi

            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi

            echo "npm ci failed on attempt $attempt; retrying..."
            sleep 15
          done

      - name: Build Linux artifact
        working-directory: product
        run: npm run build

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: dialogr-linux
          path: product/build/output/*.AppImage
          if-no-files-found: error

      - name: Upload Linux artifact to release
        if: ${{ inputs.publish_release }}
        env:
          PRODUCT_REPOSITORY_TOKEN: ${{ secrets.PRODUCT_REPOSITORY_TOKEN }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          RELEASE_REPOSITORY: ${{ inputs.release_repository }}
          OVERWRITE_RELEASE_ASSETS: ${{ inputs.overwrite_release_assets }}
        run: |
          set -euo pipefail
          if [ "$RELEASE_REPOSITORY" = "$GITHUB_REPOSITORY" ]; then
            export GH_TOKEN='${{ github.token }}'
          else
            export GH_TOKEN="$PRODUCT_REPOSITORY_TOKEN"
          fi

          if [ -z "${GH_TOKEN:-}" ]; then
            echo "PRODUCT_REPOSITORY_TOKEN is required to upload release assets outside $GITHUB_REPOSITORY."
            exit 1
          fi

          if ! gh release view "$RELEASE_TAG" --repo "$RELEASE_REPOSITORY" >/dev/null 2>&1; then
            gh release create "$RELEASE_TAG" --repo "$RELEASE_REPOSITORY" --prerelease --latest=false --title "$RELEASE_TAG" --notes "" \
              || gh release view "$RELEASE_TAG" --repo "$RELEASE_REPOSITORY" >/dev/null
          fi

          cmd=(gh release upload "$RELEASE_TAG" --repo "$RELEASE_REPOSITORY")
          if [ "$OVERWRITE_RELEASE_ASSETS" = "true" ]; then
            cmd+=(--clobber)
          fi
          shopt -s nullglob
          appimages=(product/build/output/*.AppImage)
          latestFiles=(product/build/output/latest-linux.yml)
          blockmaps=(product/build/output/*.AppImage.blockmap)

          if [ ${#appimages[@]} -eq 0 ]; then
            echo "No AppImage output found."
            exit 1
          fi

          if [ ${#latestFiles[@]} -eq 0 ]; then
            echo "Missing latest-linux.yml updater metadata."
            exit 1
          fi

          assets=("${appimages[@]}" "${latestFiles[@]}" "${blockmaps[@]}")
          "${cmd[@]}" "${assets[@]}"
